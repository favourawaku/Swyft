name: Deploy Contracts to Testnet

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force redeploy all contracts (ignore existing addresses)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  deploy:
    name: Deploy to Stellar Testnet
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --no-default-features

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Import deployer identity
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          stellar keys add swyft-deployer --secret-key "$DEPLOYER_SECRET_KEY"

      - name: Deploy contracts
        run: |
          FLAGS=""
          [[ "${{ inputs.force }}" == "true" ]] && FLAGS="--force"
          pnpm --filter contracts deploy:testnet $FLAGS

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment
          path: packages/contract/deployments/testnet.json

      - name: Commit updated testnet.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/contract/deployments/testnet.json
          git diff --cached --quiet || git commit -m "chore: update testnet deployment manifest [skip ci]"
          git push
